<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Review AI</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e2f 0%, #2a2a40 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        .card {
            background-color: #ffffff;
            width: 100%;
            max-width: 500px;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            box-sizing: border-box;
            margin: 20px;
        }

        h2 {
            margin-top: 0;
            color: #1e1e2f;
            font-size: 24px;
            text-align: center;
        }

        p.subtitle {
            color: #666;
            font-size: 14px;
            text-align: center;
            margin-bottom: 25px;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            border: 2px solid #e1e1e1;
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            resize: vertical;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #6c5ce7;
        }

        button {
            width: 100%;
            background-color: #6c5ce7;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 15px;
            transition: background-color 0.3s, transform 0.1s;
        }

        button:hover {
            background-color: #5a4bcf;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #a29bfe;
            cursor: not-allowed;
            transform: none;
        }

        .result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            display: none; /* Скрыт по умолчанию */
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .result-box.show {
            display: block;
            opacity: 1;
        }

        .positive {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .negative {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .error {
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>AI Movie Critic</h2>
        <p class="subtitle">Write a review for a film in english and get the response with ai if it's positive or negative.</p>

        <textarea id="reviewText" placeholder="f/e: The movie was absolutely fantastic! The acting was brilliant..."></textarea>

        <button id="checkBtn" onclick="checkSentiment()">Analyze the review</button>

        <div id="resultBox" class="result-box">
            <span id="resultIcon"></span> <span id="resultText"></span>
        </div>
    </div>

    <script>
        async function checkSentiment() {
            const text = document.getElementById('reviewText').value.trim();
            const btn = document.getElementById('checkBtn');
            const resultBox = document.getElementById('resultBox');
            const resultIcon = document.getElementById('resultIcon');
            const resultText = document.getElementById('resultText');

            if (!text) {
                alert("Please, enter the review!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Analyzing...";
            resultBox.className = "result-box";

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });

                if (!response.ok) throw new Error("Server error");

                const data = await response.json();

                if(data.sentiment === 'pos') {
                    resultBox.classList.add('show', 'positive');
                    resultIcon.innerText = "🍿 ✨";
                    resultText.innerText = "Positive review!";
                } else {
                    resultBox.classList.add('show', 'negative');
                    resultIcon.innerText = "🍅 😡";
                    resultText.innerText = "Negative review!";
                }
            } catch (error) {
                resultBox.classList.add('show', 'error');
                resultIcon.innerText = "⚠️";
                resultText.innerText = "Server is unavailible. Did you start uvicorn?";
            } finally {
                btn.disabled = false;
                btn.innerText = "Analyse the review";
            }
        }
    </script>
</body>
</html>
